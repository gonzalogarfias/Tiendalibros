{% extends 'layout/base.html' %}
{% block content %}

<div class="container py-5">
    <div class="checkout-summary-card">
        <h2 class="text-center mb-5">Resumen de tu Pedido</h2>
        
        <div class="table-responsive">
            <table class="table table-hover checkout-table">
                <thead>
                    <tr>
                        <th>Libro</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.book.title }}</td>
                        <td>{{ item.quantity }}</td>
                        <td class="price-column">${{ item.book.price }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-end mt-5 total-section">
            <h3>Total: <span class="total-amount">${{ total_del_carrito }}</span></h3>
            <hr>
            <div id="paypal-button-container" class="mt-4 paypal-container"></div>
        </div>
    </div>
    <div id="paypal-button-container-mobile" class="mt-5 paypal-container d-md-none"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=AbSNxYcWaUVo-LucBYDe5EzjDjY9GO5jQWWS0UGc2tOJZx2SPe8YrdkORaGlSpn5i968u_6CaTDAyzXV&currency=USD"></script>

<script>
    function renderPayPalButton(containerId) {
        paypal.Buttons({
            style: {
                color: 'gold',       
                shape: 'rect',
                label: 'pay',
                height: 48,          
                tagline: false
            },

            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '{{ total_del_carrito }}'
                        }
                    }]
                });
            },

            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    return fetch('/confirmar-pago/', {
                        method: 'POST',
                        headers: {
                            'content-type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({
                            orderID: data.orderID
                        })
                    }).then(function(response) {
                        if (response.ok) {
                            alert('¡Pago completado por ' + details.payer.name.given_name + '!');
                            window.location.href = "{% url 'home' %}";
                        } else {
                            alert('Error al procesar la confirmación. Contacta soporte.');
                        }
                    });
                });
            },

            onError: function(err) {
                console.error('PayPal Error:', err);
                alert('Hubo un problema con el pago. Intenta de nuevo.');
            }
        }).render(containerId);
    }

    document.addEventListener('DOMContentLoaded', function() {
        renderPayPalButton('#paypal-button-container');

        if (document.querySelector('#paypal-button-container-mobile')) {
            renderPayPalButton('#paypal-button-container-mobile');
        }
    });
</script>

{% endblock %}
